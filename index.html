<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="description" content="تطبيق ذكي لإدارة الدخل اليومي والتوزيع التلقائي للمصروفات والالتزامات">

<title>مدير دخلي الذكي</title>
<style>
:root {
  --bg:        #070b14;
  --bg2:       #0d1321;
  --surface:   rgba(255,255,255,0.05);
  --border:    rgba(255,255,255,0.09);
  --green:     #22d3a5;  --green-dim: rgba(34,211,165,0.15);
  --yellow:    #fbbf24;  --yellow-dim:rgba(251,191,36,0.15);
  --orange:    #fb923c;  --orange-dim:rgba(251,146,60,0.15);
  --blue:      #60a5fa;  --blue-dim:  rgba(96,165,250,0.15);
  --red:       #f87171;  --red-dim:   rgba(248,113,113,0.15);
  --purple:    #a78bfa;  --purple-dim:rgba(167,139,250,0.15);
  --pink:      #f472b6;  --pink-dim:  rgba(244,114,182,0.15);
  --text:      #e2e8f0;
  --muted:     #64748b;
  --radius:    16px;
  --gold:      #fbbf24;
  --gold-dim:  rgba(251,191,36,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  min-height:100vh;
  background:radial-gradient(ellipse at top,#0f172a 0%,#070b14 60%);
  font-family:'Segoe UI',Tahoma,sans-serif;
  direction:rtl;color:var(--text);
  padding-bottom:100px;
}


/* ── INSTALL BANNER ── */
#install-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;
  background:linear-gradient(135deg,#7c3aed,#4f46e5);padding:14px 16px;
  align-items:center;gap:10px;box-shadow:0 -4px 20px rgba(0,0,0,0.5);}
#install-banner.show{display:flex;}
#install-banner .ib-icon{font-size:26px;}
#install-banner .ib-text{flex:1;}
#install-banner .ib-title{font-size:13px;font-weight:700;}
#install-banner .ib-sub{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px;}
#install-banner .ib-btn{background:#fff;color:#4f46e5;border:none;border-radius:10px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
#install-banner .ib-close{background:none;border:none;color:rgba(255,255,255,0.6);font-size:18px;cursor:pointer;}
#ios-guide{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;
  background:#1e1b4b;border-top:1px solid rgba(124,58,237,0.5);border-radius:20px 20px 0 0;
  padding:20px 16px;box-shadow:0 -4px 20px rgba(0,0,0,0.5);}
#ios-guide.show{display:block;}
#ios-guide .ig-title{font-size:15px;font-weight:800;margin-bottom:14px;text-align:center;}
#ios-guide .ig-step{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
#ios-guide .ig-num{background:#7c3aed;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
#ios-guide .ig-txt{font-size:13px;color:#c4b5fd;}
#ios-guide .ig-close{width:100%;margin-top:10px;padding:12px;background:rgba(255,255,255,0.1);border:none;color:#fff;border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;}


/* ── HEADER ── */
.header{
  background:linear-gradient(180deg,rgba(124,58,237,0.12) 0%,transparent 100%);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:20px 18px 16px;text-align:center;
}
.header h1{font-size:21px;font-weight:800;letter-spacing:-0.3px;}
.header h1 span{color:var(--green);}
.header .month-row{display:flex;gap:8px;margin-top:12px;align-items:center;justify-content:center;flex-wrap:wrap;}
.month-nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:7px 14px;font-size:16px;cursor:pointer;font-family:inherit;}
#month-select{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:7px 14px;font-size:13px;font-family:inherit;cursor:pointer;flex:1;max-width:190px;outline:none;}
#month-select option{background:#1e1b4b;}


/* ── SUMMARY STRIP ── */
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:14px 14px 0;background:rgba(255,255,255,0.04);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.ss-cell{text-align:center;padding:11px 6px;position:relative;}
